name: 📋 기획 에이전트 (매주 월요일 오전 8시)

on:
  schedule:
    - cron: '0 23 * * 0'   # 일요일 23:00 UTC = 월요일 08:00 KST
  workflow_dispatch:

jobs:
  run-planning:
    name: 로드맵 분석·주간 작업 계획 수립
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🟢 Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 에이전트 패키지 설치
        working-directory: scripts/agents
        run: npm install

      - name: 📋 기획 에이전트 실행
        working-directory: scripts/agents
        run: node run-agent.js planning
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY:       ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID:   ${{ secrets.NOTION_DATABASE_ID }}
