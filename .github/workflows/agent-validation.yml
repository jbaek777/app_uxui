name: 🔍 검증 에이전트 (매일 오전 9시)

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 00:00 UTC = 한국 오전 9시
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  run-validation:
    name: 코드 품질·버그·TODO 자동 점검
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🟢 Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 에이전트 패키지 설치
        working-directory: scripts/agents
        run: npm install

      - name: 🔍 검증 에이전트 실행
        working-directory: scripts/agents
        run: node run-agent.js validation
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY:       ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID:   ${{ secrets.NOTION_DATABASE_ID }}
