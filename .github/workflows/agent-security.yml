name: 🔒 보안 에이전트 (매주 목요일 오전 10시)

on:
  schedule:
    - cron: '0 1 * * 4'    # 목요일 01:00 UTC = 목요일 10:00 KST
  workflow_dispatch:

jobs:
  run-security:
    name: 보안 취약점·RLS·키 노출 점검
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🟢 Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 에이전트 패키지 설치
        working-directory: scripts/agents
        run: npm install

      - name: 🔒 보안 에이전트 실행
        working-directory: scripts/agents
        run: node run-agent.js security
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY:       ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID:   ${{ secrets.NOTION_DATABASE_ID }}
